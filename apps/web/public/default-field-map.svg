    <ellipse cx="960" cy="385" rx="180" ry="55"/>
    <ellipse cx="620" cy="365" rx="210" ry="58"/>
  </g>

  <g fill="#f8fbff" opacity="0.95" font-family="Arial, sans-serif" text-anchor="middle">
