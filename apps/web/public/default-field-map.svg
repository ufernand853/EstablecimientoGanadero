    <path d="M330 410 L350 560"/>
    <path d="M500 400 L510 560"/>
    <path d="M680 395 L670 560"/>
    <path d="M840 400 L820 560"/>
    <path d="M1020 415 L980 560"/>
  </g>

  <g fill="#4f9b45" opacity="0.6">
