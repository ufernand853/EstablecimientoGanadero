      <stop offset="0%" stop-color="#7cc6ff"/>
      <stop offset="100%" stop-color="#d9f0ff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8bcf6b"/>
      <stop offset="100%" stop-color="#6cae4f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="350" fill="url(#sky)"/>
